name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Trigger .NET backend deploy
        run: curl -X POST "${{ secrets.RENDER_DOTNET_DEPLOY_HOOK }}"

      - name: Trigger Python recommender deploy
        run: curl -X POST "${{ secrets.RENDER_PYTHON_DEPLOY_HOOK }}"